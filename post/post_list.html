<!DOCTYPE html>
<html lang="ko">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Archive</title>
</head>

<body class="bg-gray-50 text-sky-800 antialiased">

    <header class="bg-sky-200/70 backdrop-blur-md text-sky-900">
        <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold">
                <a href="../index.html" class="hover:text-sky-600 transition-colors duration-200">
                    AndoTechBlog
                </a>
            </h1>
        </nav>
    </header>

    <main class="max-w-7xl mx-auto p-5 flex flex-col md:flex-row gap-6">

        <aside class="w-full md:w-64 flex-shrink-0">
            <div class="sticky top-5 p-6 bg-white/80 border border-sky-300 rounded-xl shadow-sm">
                <h2 class="text-lg font-bold text-sky-700 mb-4 pb-2 border-b border-sky-100">Categories</h2>
                <ul class="space-y-2">
                    <li><a href="#" class="block px-3 py-2 rounded-lg hover:bg-sky-100 transition-colors">All Posts</a>

                    <li><a href="#"

                    <li><a href="#" class="block px-3 py-2 rounded-lg hover:bg-sky-100 transition-colors">Design</a>
                    </li>
                    <li><a href="#" class="block px-3 py-2 rounded-lg hover:bg-sky-100 transition-colors">Life</a></li>
                </ul>
            </div>
        </aside>

        <section class="flex-1 rounded-xl px-8 pt-8 py-4 bg-white/80 border border-sky-300 shadow-sm">
            <div class="text-lg font-bold text-sky-700 mb-6 border-b border-sky-100 pb-2">
                Archive
            </div>

            <div id="archive-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 h-[630px] content-start">
            </div>

            <div id="pagination-archive-list" class="mt-8 flex justify-center border-t border-sky-50 pt-6 gap-x-3">
            </div>
        </section>

    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            loadPosts('archive-list', 6, './data', 1, true);
        });
    </script>

</body>

</html>
