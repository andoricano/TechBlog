<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="./post_manager.js"></script>
</head>

<body class="bg-slate-50">

    <header class="bg-sky-200/70 backdrop-blur-md text-sky-900">

        <nav class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <h1 class="text-xl font-bold">
                <a href="../index.html" class="hover:text-sky-600 transition-colors duration-200">
                    AndoTechBlog
                </a>
            </h1>
        </nav>
    </header>

    <main class="max-w-4xl mx-auto px-6 py-12 bg-white shadow-sm min-h-screen">
        <section class="text-center mb-16">
            <h2 id="post-title" class="text-4xl font-extrabold text-slate-800 mb-4">
                로딩 중...
            </h2>
            <div id="post-date" class="text-slate-400 font-medium">
            </div>
            <div id="post-tags" class="mt-4 flex justify-center gap-2">
            </div>
        </section>

        <article id="post-content" class="prose prose-sky max-w-none min-h-[400px] border-b border-slate-100 pb-16">
            <p class="text-slate-300 text-center mt-20">본문을 불러오는 중입니다...</p>
        </article>

        <section class="mt-16">
            <div class="flex items-center justify-between mb-6 border-b border-slate-100 pb-4">
                <h3 class="text-lg font-bold text-slate-700">다른 글 읽기</h3>
                <a href="post_list.html"
                    class="flex items-center gap-1 text-sm font-semibold text-sky-600 hover:text-sky-800 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                    전체 목록
                </a>
            </div>

            <div id="text-archive-list" class="space-y-2">
            </div>

            <div id="pagination-text-archive-list" class="mt-8 flex justify-center gap-2"></div>
        </section>
    </main>


    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const postId = new URLSearchParams(window.location.search).get('id');

            if (!postId) return location.href = 'post_list.html';
            initPostDetail(postId, './data');

            loadPosts('text-archive-list', 5, './data', 1, true, 'text');
        });
    </script>
</body>

</html>
